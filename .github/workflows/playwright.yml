name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      BACKEND_BASE_URL: ${{ secrets.BACKEND_BASE_URL }}
      TEST_VALID_USERNAME : ${{ secrets.TEST_VALID_USERNAME }}
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD : ${{ secrets.TEST_USER_PASSWORD }}
      TEST_INVALID_USER_PASSWORD : ${{ secrets.TEST_INVALID_USER_PASSWORD }}
      TEST_INVALID_USER_EMAIL : ${{ secrets.TEST_INVALID_USER_EMAIL }}

    defaults:
      run:
        working-directory: tests-e2e

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests-e2e/playwright-report